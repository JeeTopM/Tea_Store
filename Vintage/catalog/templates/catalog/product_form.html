{% extends 'catalog/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="mt-3">
        <button class="btn btn-success">💾 Сохранить</button>
        <a href="{% url 'product_list' %}" class="btn btn-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
