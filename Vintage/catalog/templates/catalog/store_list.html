{% extends 'catalog/base.html' %}
{% block title %}Магазины{% endblock %}
{% block content %}
<h1 class="mb-4">Магазины</h1>
<a href="{% url 'store_create' %}" class="btn btn-primary mb-3">➕ Добавить магазин</a>
<table class="table table-striped align-middle">
    <thead><tr><th>Название</th><th>Адрес</th><th></th></tr></thead>
    <tbody>
        {% for store in stores %}
        <tr>
            <td>{{ store.name }}</td>
            <td>{{ store.address }}</td>
            <td class="text-end">
                <a href="{% url 'store_update' store.pk %}" class="btn btn-sm btn-warning">✏️</a>
                <a href="{% url 'store_delete' store.pk %}" class="btn btn-sm btn-danger">🗑️</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="text-center text-muted">Нет магазинов</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
