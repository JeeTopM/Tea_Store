{% extends 'catalog/base.html' %}
{% block title %}Удалить партию{% endblock %}
{% block content %}
<h1>Удалить партию "{{ batch }}"?</h1>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'batch_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
