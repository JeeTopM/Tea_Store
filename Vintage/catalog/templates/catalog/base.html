{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Каталог{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .store-card {
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .store-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">📦 Каталог</a>
        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'store_list' %}">Магазины</a>
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'category_list' %}">Категории</a>
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'product_list' %}">Продукты</a>
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'batch_list' %}">Партии</a>
            <a class="btn btn-warning btn-sm" href="{% url 'expiring_report' %}">📅 Отчёт</a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
