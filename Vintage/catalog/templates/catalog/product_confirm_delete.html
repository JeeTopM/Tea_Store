{% extends 'catalog/base.html' %}
{% block title %}Удалить продукт{% endblock %}
{% block content %}
<h1>Удалить продукт "{{ product.name }}"?</h1>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
